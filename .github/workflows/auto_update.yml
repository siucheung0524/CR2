name: Update All Podcasts

on:
  schedule:
    # 第一次更新：香港時間 13:00 (UTC 05:00)
    - cron: '0 5 * * 1-5'
    
    # 第二次更新：香港時間 20:00 (UTC 12:00)
    - cron: '0 12 * * 1-5'
    
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Update Podcasts
        run: |
          python update_podcast.py
          python update_ilub.py
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add rss.xml ilub.xml
          git commit -m "Auto-check for new episodes" || exit 0
          git push
